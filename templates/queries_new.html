{% extends "base.html" %}
{% block content %}
<style>
  .query-container {
    max-width: 100%;
    margin: 0;
    padding: 0;
    background: #ffffff;
    width: 100%;
  }

  .query-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    background: #f9fafb;
    border-bottom: 1px solid #e5e7eb;
    margin-bottom: 0;
  }

  .query-header > div:first-child {
    flex: 1;
  }

  .query-header h1 {
    margin: 0;
    font-size: 24px;
    font-weight: 600;
    color: #111827;
  }

  .query-header p {
    margin: 2px 0 0 0;
    color: #6b7280;
    font-size: 12px;
  }

  .query-form {
    display: grid;
    gap: 0;
    padding: 12px 20px;
  }

  .form-section {
    padding: 10px 12px;
    background: #ffffff;
    border-radius: 6px;
    border: 1px solid #e5e7eb;
    margin-bottom: 10px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    color: #6b7280;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    grid-column: 1 / -1;
    padding-bottom: 4px;
    border-bottom: 1px solid #e5e7eb;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 8px;
  }

  .form-grid.full {
    grid-template-columns: 1fr;
  }

  .form-group {
    display: flex;
    flex-direction: column;
  }

  .form-group-full {
    grid-column: 1 / -1;
  }

  .form-group label {
    font-size: 12px;
    font-weight: 500;
    color: #374151;
    margin-bottom: 2px;
  }

  .required {
    color: #ef4444;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    padding: 8px 10px;
    border: 1px solid #d1d5db;
    border-radius: 4px;
    font-size: 13px;
    font-family: inherit;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
  }

  .form-group textarea {
    resize: vertical;
    min-height: 60px;
    font-family: inherit;
  }

  .form-actions {
    display: flex;
    gap: 12px;
    padding: 16px;
    background: #ffffff;
    border-radius: 6px;
    border: 1px solid #e5e7eb;
    justify-content: flex-start;
  }

  .query-btn {
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-block;
  }

  .query-btn-primary {
    background: #3b82f6;
    color: white;
  }

  .query-btn-primary:hover {
    background: #2563eb;
  }

  .query-btn-secondary {
    background: #e5e7eb;
    color: #111827;
  }

  .query-btn-secondary:hover {
    background: #d1d5db;
  }

  .alert {
    padding: 12px 16px;
    border-radius: 6px;
    margin: 20px 30px 0 30px;
    font-size: 14px;
    border: 1px solid;
  }

  .alert-error {
    background-color: #fee2e2;
    color: #991b1b;
    border-color: #fecaca;
  }

  .alert-success {
    background-color: #dcfce7;
    color: #166534;
    border-color: #bbf7d0;
  }
</style>

<div class="query-container">
  <div class="query-header">
    <div>
      <h1>Create New Query Request</h1>
    </div>
  </div>

  <!-- Flash Messages -->
  {% if flash_messages %}
    {% for message in flash_messages %}
      <div class="alert alert-{{ message.category }}">
        {{ message.message }}
      </div>
    {% endfor %}
  {% endif %}

  <!-- Form -->
  <form method="POST" action="/queries" class="query-form">
    <!-- Requestor Information Section (MOVED UP) -->
    <div class="form-section">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #e5e7eb;">
        <div class="section-title" style="margin-bottom: 0; border-bottom: none; padding-bottom: 0;">👤 Customer & Requestor</div>
        <div style="font-size: 13px; font-weight: 600; color: #374151; background: #f0f4f8; padding: 6px 12px; border-radius: 4px;">
          <span style="color: #6b7280;">Query #:</span> <span id="queryNumberPreview" style="font-family: monospace; color: #0066cc;">QRY-????-0001</span>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label><span class="required">*</span>Customer Name</label>
          <select name="caller" id="customerSelect" required onchange="updateContracts(); updateRequestors()">
            <option value="">-- Select Customer --</option>
            {% for customer in customers %}
            <option value="{{ customer.name }}">
              {{ customer.name }}
            </option>
            {% endfor %}
          </select>
        </div>
        
        <div class="form-group">
          <label><span class="required">*</span>Requestor Name</label>
          <select name="requestor_name" id="requestorSelect" required onchange="updateRequestorContact()">
            <option value="">-- Select Contact --</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>Requestor Contact</label>
          <input type="text" name="requestor_contact" id="requestorPhone" placeholder="Phone or Email" readonly />
        </div>
        
        <div class="form-group">
          <label>Requestor Email</label>
          <input type="email" name="requestor_email" id="requestorEmail" placeholder="Email address" readonly />
        </div>
      </div>
    </div>

    <!-- Query Details Section (MOVED DOWN) -->
    <div class="form-section">
      <div class="section-title">Query Details</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Title <span class="required">*</span></label>
          <input type="text" name="title" required placeholder="Query title">
        </div>
        
        <div class="form-group">
          <label>Query Type <span class="required">*</span></label>
          <select name="query_type" required>
            <option value="">-- Select Query Type --</option>
            {% for qt in query_types %}
              <option value="{{ qt }}">{{ qt }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label>Status</label>
          <select name="status">
            <option value="Open" selected>Open</option>
            {% for s in statuses %}
              <option value="{{ s }}">{{ s }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label>Priority</label>
          <select name="priority">
            <option value="Medium" selected>Medium</option>
            {% for p in priorities %}
              <option value="{{ p }}">{{ p }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label>Assigned To</label>
          <input type="text" name="assigned_to" placeholder="Assigned to">
        </div>

        <div class="form-group">
          <label>Assignment Group</label>
          <input type="text" name="assignment_group" placeholder="Assignment group">
        </div>

        <div class="form-group form-group-full">
          <label>Subject</label>
          <input type="text" name="subject" placeholder="Query subject">
        </div>

        <div class="form-group form-group-full">
          <label>Description</label>
          <textarea name="description" placeholder="Detailed description of your query"></textarea>
        </div>
      </div>
    </div>

    <!-- Form Actions -->
    <div class="form-actions">
      <button type="submit" class="query-btn query-btn-primary">Submit Query</button>
      <a href="/queries" class="query-btn query-btn-secondary">Cancel</a>
    </div>
  </form>
</div>

<script>
  // Customer contacts data
  const customerContactsData = {{ customers | tojson }};
  const customerContactsMap = {};
  
  document.addEventListener('DOMContentLoaded', function() {
    // Populate the map from server data
    customerContactsData.forEach(customer => {
      if (customer.name && customer.contacts && Array.isArray(customer.contacts)) {
        customerContactsMap[customer.name] = customer.contacts;
      }
    });
  });

  // Update contracts based on customer selection
  function updateContracts() {
    const customerSelect = document.getElementById('customerSelect');
    const contractSelect = document.getElementById('contractSelect');
    const selectedCustomer = customerSelect.value;

    // Update query number preview
    updateQueryNumberPreview(selectedCustomer);

    // Only process contracts if the element exists
    if (contractSelect) {
      // Reset contracts
      contractSelect.value = '';

      // Filter contracts
      for (let option of contractSelect.options) {
        if (option.value === '') {
          option.style.display = '';
        } else {
          const optionCustomer = option.getAttribute('data-customer');
          option.style.display = (optionCustomer === selectedCustomer) ? '' : 'none';
        }
      }
    }

    // Update requestor options
    updateRequestors();
  }

  // Update requestor list based on customer
  function updateRequestors() {
    const customerSelect = document.getElementById('customerSelect');
    const requestorSelect = document.getElementById('requestorSelect');
    const selectedCustomer = customerSelect.value;

    requestorSelect.innerHTML = '<option value="">-- Select Contact --</option>';
    requestorSelect.value = '';
    document.getElementById('requestorPhone').value = '';

    if (selectedCustomer && customerContactsMap[selectedCustomer]) {
      const contacts = customerContactsMap[selectedCustomer];
      contacts.forEach(contact => {
        const option = document.createElement('option');
        option.value = contact.name;
        option.setAttribute('data-phone', contact.phone || '');
        option.setAttribute('data-email', contact.email || '');
        option.textContent = contact.name;
        requestorSelect.appendChild(option);
      });
    }
  }

  // Update phone and email when requestor is selected
  function updateRequestorContact() {
    const requestorSelect = document.getElementById('requestorSelect');
    const selectedOption = requestorSelect.options[requestorSelect.selectedIndex];
    const phone = selectedOption.getAttribute('data-phone') || '';
    const email = selectedOption.getAttribute('data-email') || '';

    document.getElementById('requestorPhone').value = phone || email || '';
    document.getElementById('requestorEmail').value = email || '';
  }

  // Placeholder for contract-based filtering if needed
  function filterRequestorsForContract() {
    // Can implement additional filtering based on contract if needed
  }

  // Generate query number preview based on customer selection
  function updateQueryNumberPreview(customerName) {
    const preview = document.getElementById('queryNumberPreview');
    if (!customerName) {
      preview.textContent = 'QRY-????-0001';
      return;
    }

    // Extract initials from customer name
    let initials = '';
    const words = customerName.split(' ');
    
    if (customerName.toLowerCase().includes('air force')) {
      initials = 'IAF';
    } else if (customerName.toLowerCase().includes('army')) {
      initials = 'IA';
    } else if (customerName.toLowerCase().includes('navy')) {
      initials = 'IN';
    } else {
      // Fallback: get first letter of each word
      initials = words.map(w => w.charAt(0).toUpperCase()).join('');
    }

    preview.textContent = `QRY-${initials}-0001`;
  }
</script>
{% endblock %}
