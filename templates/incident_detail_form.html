{% extends "base.html" %}
{% block content %}
<section class="si-incident-new">
  <header class="si-incident-header">
    <div>
      <div class="si-incident-title">Incident</div>
      <div class="si-incident-subtitle">{{ incident.incident_number or "INC" + "%07d" | format(incident.id) }}</div>
    </div>
    <div class="si-incident-actions">
      <button type="submit" form="incident-detail-form" class="si-btn">Save</button>
      <a href="/incidents" class="si-btn si-btn-secondary">Cancel</a>
    </div>
  </header>

  <form id="incident-detail-form" method="post" action="/incidents/{{ incident.id }}" class="si-incident-form">
    <div class="si-incident-grid">
      <div class="si-incident-section">Incident details</div>
      <div class="si-incident-field">
        <label>Incident Number</label>
        <input value="{{ incident.incident_number or 'INC' + '%07d' | format(incident.id) }}" readonly disabled />
      </div>
      <div class="si-incident-field">
        <label>Created on</label>
        <input value="{{ format_utc(incident.created_at, "%Y-%m-%d %H:%M:%S") }}" readonly disabled />
      </div>

      <div class="si-incident-field">
        <label>Status</label>
        <select name="status">
          {% for status in statuses %}
          <option value="{{ status.id }}" {% if incident.status == status.id %}selected{% endif %}>{{ status.label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="si-incident-field">
        <label>Priority</label>
        <select name="priority">
          {% for priority in priorities %}
          <option value="{{ priority.id }}" {% if incident.priority == priority.id %}selected{% endif %}>{{ priority.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="si-incident-divider"></div>
      <div class="si-incident-section">Customer</div>
      <div class="si-incident-field">
        <label><span class="si-required">*</span> Customer Name</label>
        <input name="caller" placeholder="Select customer" list="customer-name-list" value="{{ incident.caller or '' }}" />
        <datalist id="customer-name-list">
          <option value="Indian Air Force"></option>
          <option value="Indian Army"></option>
          <option value="Indian Navy"></option>
        </datalist>
      </div>
      <div class="si-incident-field">
        <label>Customer Contract</label>
        <input name="customer_contract" placeholder="e.g., Contract-2024-1234" value="{{ incident.customer_contract or '' }}" />
      </div>

      <div class="si-incident-field">
        <label>Requestor Name</label>
        <input name="requestor_name" placeholder="Requestor name" value="{{ incident.requestor_name or '' }}" />
      </div>
      <div class="si-incident-field">
        <label>Requestor Contact</label>
        <input name="requestor_contact" placeholder="Phone or Email" value="{{ incident.requestor_contact or '' }}" />
      </div>

      <div class="si-incident-divider"></div>
      <div class="si-incident-section">Incident Classification</div>
      <div class="si-incident-field">
        <label>Issue Type</label>
        <select name="issue_type">
          <option value="">-- Select Issue Type --</option>
          {% for issue_type in issue_types %}
          <option value="{{ issue_type.id }}" {% if incident.issue_type == issue_type.id %}selected{% endif %}>{{ issue_type.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="si-incident-field">
        <label>SLA</label>
        <input name="sla" placeholder="e.g., 4 hours, 24 hours" value="{{ incident.sla or '' }}" />
      </div>
      <div class="si-incident-field">
        <label>Assignment Group</label>
        <input name="assignment_group" placeholder="Technical Support, Engineering, Field Operations" value="{{ incident.assignment_group or '' }}" />
      </div>
      <div class="si-incident-field">
        <label>Assigned to</label>
        <input name="assigned_to" placeholder="Engineer or team member" value="{{ incident.assigned_to or '' }}" />
      </div>

      <div class="si-incident-divider"></div>
      <div class="si-incident-section">Product details</div>
      <div class="si-incident-field">
        <label>System Type</label>
        <select name="srlm_system" id="srlm-select">
          <option value="">-- None --</option>
          <option value="SRLM" {% if incident.srlm_system == 'SRLM' %}selected{% endif %}>SRLM</option>
          <option value="ERLM" {% if incident.srlm_system == 'ERLM' %}selected{% endif %}>ERLM</option>
        </select>
      </div>
      <div class="si-incident-field">
        <label>Product Category</label>
        <select name="platform_variant" id="platform-variant">
          <option value="">-- None --</option>
          <option value="Loitering Munition (LM)" {% if incident.platform_variant == 'Loitering Munition (LM)' %}selected{% endif %}>Loitering Munition (LM)</option>
          <option value="Gimbal" {% if incident.platform_variant == 'Gimbal' %}selected{% endif %}>Gimbal</option>
          <option value="Tracker" {% if incident.platform_variant == 'Tracker' %}selected{% endif %}>Tracker</option>
          <option value="GCS" {% if incident.platform_variant == 'GCS' %}selected{% endif %}>GCS</option>
          <option value="GDT" {% if incident.platform_variant == 'GDT' %}selected{% endif %}>GDT</option>
          <option value="Simulator" {% if incident.platform_variant == 'Simulator' %}selected{% endif %}>Simulator</option>
          <option value="RDV" {% if incident.platform_variant == 'RDV' %}selected{% endif %}>RDV</option>
          <option value="TMV" {% if incident.platform_variant == 'TMV' %}selected{% endif %}>TMV</option>
          <option value="Warhead + ESAM" {% if incident.platform_variant == 'Warhead + ESAM' %}selected{% endif %}>Warhead + ESAM</option>
        </select>
      </div>
      <div class="si-incident-field">
        <label>Serial Number</label>
        <input name="line_replaceable_unit" placeholder="e.g., LM-SN-001-01" value="{{ incident.line_replaceable_unit or '' }}" />
      </div>
      <div class="si-incident-field">
        <label>Sub-system</label>
        <select name="sub_system" id="sub-system">
          <option value="">-- None --</option>
          <option value="Airframe" {% if incident.sub_system == 'Airframe' %}selected{% endif %}>Airframe</option>
          <option value="Propulsion" {% if incident.sub_system == 'Propulsion' %}selected{% endif %}>Propulsion</option>
          <option value="Avionics & Flight Control" {% if incident.sub_system == 'Avionics & Flight Control' %}selected{% endif %}>Avionics & Flight Control</option>
          <option value="Communication" {% if incident.sub_system == 'Communication' %}selected{% endif %}>Communication</option>
          <option value="Payload" {% if incident.sub_system == 'Payload' %}selected{% endif %}>Payload</option>
          <option value="Computing" {% if incident.sub_system == 'Computing' %}selected{% endif %}>Computing</option>
          <option value="Display" {% if incident.sub_system == 'Display' %}selected{% endif %}>Display</option>
          <option value="Control Interface" {% if incident.sub_system == 'Control Interface' %}selected{% endif %}>Control Interface</option>
          <option value="Power" {% if incident.sub_system == 'Power' %}selected{% endif %}>Power</option>
        </select>
      </div>

      <div class="si-incident-divider"></div>
      <div class="si-incident-section">Service history</div>
      <div class="si-incident-field">
        <label>Warranty Status</label>
        <input name="warranty_status" placeholder="Active/Expired/Expiring Soon" value="{{ incident.warranty_status or '' }}" />
      </div>
      <div class="si-incident-field">
        <label>Last Serviced on</label>
        <input name="last_serviced_date" placeholder="YYYY-MM-DD" value="{{ incident.last_serviced_date or '' }}" />
      </div>

      <div class="si-incident-divider"></div>
      <div class="si-incident-section">Issue description</div>
      <div class="si-incident-field si-incident-field-wide">
        <label><span class="si-required">*</span> Short description</label>
        <input name="title" placeholder="Short description" value="{{ incident.title }}" required />
      </div>

      <div class="si-incident-field si-incident-field-wide">
        <label>Description</label>
        <textarea name="description" placeholder="Description">{{ incident.description }}</textarea>
      </div>
    </div>
  </form>
</section>

<script>
  const platformVariants = [
    {
      customer: "Acme Rail Systems",
      contract: "CTR-2024-001",
      srlm: "SRLM",
      variant: "Loitering Munition (LM)",
    },
    {
      customer: "Acme Rail Systems",
      contract: "CTR-2024-001",
      srlm: "SRLM",
      variant: "Gimbal",
    },
    {
      customer: "MetroLine Services",
      contract: "CTR-2024-014",
      srlm: "SRLM",
      variant: "Tracker",
    },
    {
      customer: "MetroLine Services",
      contract: "CTR-2024-014",
      srlm: "SRLM",
      variant: "GCS",
    },
    {
      customer: "Urban Transit Corp",
      contract: "CTR-2023-220",
      srlm: "ERLM",
      variant: "GDT",
    },
    {
      customer: "Urban Transit Corp",
      contract: "CTR-2023-220",
      srlm: "ERLM",
      variant: "Simulator",
    },
    {
      customer: "Acme Rail Systems",
      contract: "CTR-2024-001",
      srlm: "ERLM",
      variant: "RDV",
    },
    {
      customer: "MetroLine Services",
      contract: "CTR-2024-014",
      srlm: "ERLM",
      variant: "TMV",
    },
    {
      customer: "Urban Transit Corp",
      contract: "CTR-2023-220",
      srlm: "SRLM",
      variant: "Warhead + ESAM",
    },
  ];

  const customerContacts = [
    {
      customer: "Acme Rail Systems",
      primary: { name: "Ravi Kumar", contact: "+91 98765 43210" },
      additional: [],
    },
    {
      customer: "MetroLine Services",
      primary: { name: "Neha Singh", contact: "+91 91234 56789" },
      additional: [
        { name: "Amit Rao", contact: "+91 90000 11223" },
      ],
    },
    {
      customer: "Urban Transit Corp",
      primary: { name: "Arjun Mehta", contact: "+91 99887 66554" },
      additional: [
        { name: "Kavya Nair", contact: "+91 91111 22334" },
        { name: "Rahul Iyer", contact: "+91 93333 44556" },
      ],
    },
  ];

  const lruOptions = [
    {
      srlm: "SRLM",
      platformVariant: "Loitering Munition (LM)",
      subSystem: "Navigation",
      lru: "Guidance Module (LRU-1001)",
    },
    {
      srlm: "SRLM",
      platformVariant: "Loitering Munition (LM)",
      subSystem: "Airframe",
      lru: "Airframe Sensor Pack (LRU-1002)",
    },
    {
      srlm: "SRLM",
      platformVariant: "Gimbal",
      subSystem: "Stabilization",
      lru: "Gimbal Motor (LRU-1101)",
    },
    {
      srlm: "SRLM",
      platformVariant: "Tracker",
      subSystem: "Tracking",
      lru: "Tracker Antenna (LRU-1201)",
    },
    {
      srlm: "SRLM",
      platformVariant: "GCS",
      subSystem: "Computing",
      lru: "Compute Node A (LRU-2101)",
    },
    {
      srlm: "SRLM",
      platformVariant: "GCS",
      subSystem: "Communication",
      lru: "Comms Router (LRU-2103)",
    },
    {
      srlm: "ERLM",
      platformVariant: "GDT",
      subSystem: "Display",
      lru: "Display Panel (LRU-2105)",
    },
    {
      srlm: "ERLM",
      platformVariant: "Simulator",
      subSystem: "Computing",
      lru: "Sim Compute Node (LRU-4101)",
    },
    {
      srlm: "ERLM",
      platformVariant: "RDV",
      subSystem: "Powertrain",
      lru: "RDV Motor (LRU-3201)",
    },
    {
      srlm: "ERLM",
      platformVariant: "TMV",
      subSystem: "Powertrain",
      lru: "Transmission Module (LRU-3101)",
    },
    {
      srlm: "SRLM",
      platformVariant: "Warhead + ESAM",
      subSystem: "Payload",
      lru: "Warhead Module (LRU-5001)",
    },
  ];

  // Dependent field filtering logic
  function updatePlatformVariants() {
    const srlmSelect = document.getElementById("srlm-select");
    const platformSelect = document.getElementById("platform-variant");
    const selectedSrlm = srlmSelect.value;

    platformSelect.innerHTML = '<option value="">-- None --</option>';
    const variants = platformVariants.filter((v) => v.srlm === selectedSrlm);
    variants.forEach((v) => {
      const option = document.createElement("option");
      option.value = v.variant;
      option.textContent = v.variant;
      platformSelect.appendChild(option);
    });
  }

  function updateSubSystems() {
    const srlmSelect = document.getElementById("srlm-select");
    const subSystemSelect = document.getElementById("sub-system");
    const selectedSrlm = srlmSelect.value;

    const subSystems = subSystemSelect.querySelectorAll("option");
    subSystems.forEach((option) => {
      if (option.dataset.srlm) {
        option.style.display = option.dataset.srlm === selectedSrlm ? "block" : "none";
      }
    });
  }

  function updateLruOptions() {
    const srlmSelect = document.getElementById("srlm-select");
    const platformSelect = document.getElementById("platform-variant");
    const subSystemSelect = document.getElementById("sub-system");
    const lruSelect = document.getElementById("lru-select");

    const selectedSrlm = srlmSelect.value;
    const selectedPlatform = platformSelect.value;
    const selectedSubSystem = subSystemSelect.value;

    lruSelect.innerHTML = '<option value="">-- None --</option>';

    const matchingLrus = lruOptions.filter(
      (lru) =>
        lru.srlm === selectedSrlm &&
        lru.platformVariant === selectedPlatform &&
        lru.subSystem === selectedSubSystem
    );

    matchingLrus.forEach((lru) => {
      const option = document.createElement("option");
      option.value = lru.lru;
      option.textContent = lru.lru;
      lruSelect.appendChild(option);
    });
  }

  function updateProductSerialNo() {
    const productSerialInput = document.querySelector("input[name='line_replaceable_unit']");
    const srlmSelect = document.getElementById("srlm-select");
    const platformSelect = document.getElementById("platform-variant");

    if (!productSerialInput || !srlmSelect || !platformSelect) {
      return;
    }

    const selectedSrlm = srlmSelect.value;
    const selectedPlatform = platformSelect.value;

    // Find all LRU options matching the selected platform variant
    const matchingOptions = lruOptions.filter(
      (item) => item.srlm === selectedSrlm && item.platformVariant === selectedPlatform
    );

    // Clear the input and create a datalist with suggestions
    productSerialInput.value = "";
    
    let datalist = document.getElementById("product-serial-list");
    if (!datalist) {
      datalist = document.createElement("datalist");
      datalist.id = "product-serial-list";
      document.body.appendChild(datalist);
      productSerialInput.setAttribute("list", "product-serial-list");
    } else {
      datalist.innerHTML = "";
    }

    // Populate datalist with available product serial numbers
    matchingOptions.forEach((item) => {
      const option = document.createElement("option");
      option.value = item.lru;
      datalist.appendChild(option);
    });
  }

  function updateRequestorFields() {
    const callerInput = document.querySelector('input[name="caller"]');
    const requestorNameInput = document.querySelector('input[name="requestor_name"]');
    const requestorContactInput = document.querySelector('input[name="requestor_contact"]');

    const requestorNameList = document.getElementById("requestor-name-list");
    const requestorContactList = document.getElementById("requestor-contact-list");

    const customer = customerContacts.find(
      (c) => c.customer === callerInput.value
    );

    if (customer) {
      requestorNameList.innerHTML = "";
      requestorContactList.innerHTML = "";

      const allContacts = [customer.primary, ...customer.additional];
      allContacts.forEach((contact) => {
        const nameOption = document.createElement("option");
        nameOption.value = contact.name;
        requestorNameList.appendChild(nameOption);

        const contactOption = document.createElement("option");
        contactOption.value = contact.contact;
        requestorContactList.appendChild(contactOption);
      });
    }
  }

  // Event listeners
  document.getElementById("srlm-select").addEventListener("change", () => {
    updatePlatformVariants();
    updateSubSystems();
    updateLruOptions();
    updateProductSerialNo();
  });

  document.getElementById("platform-variant").addEventListener("change", () => {
    updateLruOptions();
    updateProductSerialNo();
  });
  document.getElementById("sub-system").addEventListener("change", updateLruOptions);

  document.querySelector('input[name="caller"]').addEventListener("change", updateRequestorFields);
</script>
{% endblock %}
